services:
  harness:
    image: agent-harness:latest
    build: .
    container_name: agent-harness
    restart: unless-stopped
    
    # Mount secrets from host (read-only)
    volumes:
      - ./config/master.key:/app/config/master.key:ro
      - ./config/secrets.yml.enc:/app/config/secrets.yml.enc:ro
      - harness-data:/app/data
      - harness-logs:/app/logs
    
    # Environment (non-secret config)
    # Secrets are mounted from config/secrets.yml.enc
    env_file:
      - .env
    environment:
      - RUBY_ENV=production
    
    # Port for metrics
    ports:
      - "127.0.0.1:9090:9090"
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    networks:
      - agent-harness-network

  prometheus:
    image: prom/prometheus:latest
    container_name: agent-harness-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9091:9090"
    networks:
      - agent-harness-network
    depends_on:
      - harness

  grafana:
    image: grafana/grafana:latest
    container_name: agent-harness-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-harness}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-harness}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://127.0.0.1:3000
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - agent-harness-network
    depends_on:
      - prometheus

networks:
  agent-harness-network:
    driver: bridge

volumes:
  harness-data:
  harness-logs:
  prometheus-data:
  grafana-data:
